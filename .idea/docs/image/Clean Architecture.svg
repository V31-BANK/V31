<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Clean Architecture Dependency Diagram</title>
  <desc id="desc">A Clean Architecture diagram showing Presentation calling Application, Application using Domain and ports, Infrastructure implementing Application ports, and no direct dependency from Presentation to Infrastructure.</desc>

  <defs>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="core-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="app-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="#f8fafc"/>

  <text x="600" y="64" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#0f172a">Clean Architecture</text>
  <text x="600" y="98" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#475569">Dependencies point inward. Runtime flow enters through application use cases.</text>

  <!-- Main architecture surface -->
  <rect x="58" y="130" width="1084" height="560" rx="18" fill="#ffffff" stroke="#e2e8f0" filter="url(#soft-shadow)"/>

  <!-- Outer adapters -->
  <g id="presentation">
    <rect x="100" y="240" width="245" height="238" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text x="222.5" y="286" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800" fill="#9a3412">Presentation</text>
    <text x="222.5" y="320" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">HTTP controllers</text>
    <text x="222.5" y="348" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">UI / CLI / GraphQL</text>
    <text x="222.5" y="376" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">Request mapping</text>
    <text x="222.5" y="421" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Calls application use cases</text>
  </g>

  <g id="infrastructure">
    <rect x="855" y="240" width="245" height="238" rx="14" fill="#f0fdfa" stroke="#99f6e4" stroke-width="2"/>
    <text x="977.5" y="286" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800" fill="#0f766e">Infrastructure</text>
    <text x="977.5" y="320" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#115e59">Database adapters</text>
    <text x="977.5" y="348" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#115e59">Cache / message queue</text>
    <text x="977.5" y="376" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#115e59">External API clients</text>
    <text x="977.5" y="421" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f766e">Implements application ports</text>
  </g>

  <!-- Core circles -->
  <circle cx="600" cy="360" r="210" fill="url(#app-grad)" stroke="#93c5fd" stroke-width="3"/>
  <circle cx="600" cy="360" r="116" fill="url(#core-grad)" stroke="#86efac" stroke-width="3"/>

  <text x="600" y="218" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800" fill="#1d4ed8">Application</text>
  <text x="600" y="252" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#1e40af">Use cases, orchestration, transactions</text>
  <text x="600" y="279" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#1e40af">Input ports and output ports</text>

  <text x="600" y="337" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800" fill="#166534">Domain</text>
  <text x="600" y="372" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#14532d">Entities, value objects</text>
  <text x="600" y="399" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#14532d">Domain services and rules</text>

  <!-- Ports -->
  <g id="ports">
    <rect x="484" y="486" width="232" height="64" rx="12" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
    <text x="600" y="511" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800" fill="#1d4ed8">Application Ports/Service </text>
    <text x="600" y="535" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#1e40af">Repository, gateway, presenter interfaces</text>
  </g>

  <path d="M505 704 C430 650, 342 553, 282 478" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="6 7" marker-end="url(#arrow-gray)"/>
  <path d="M695 704 C770 650, 858 553, 918 478" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="6 7" marker-end="url(#arrow-gray)"/>

  <!-- Forbidden direct dependency -->
  <path d="M345 467 C480 632, 720 632, 855 467" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="10 8"/>
  <g transform="translate(585 608)">
    <circle cx="15" cy="15" r="18" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <path d="M6 6 L24 24 M24 6 L6 24" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="600" y="665" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800" fill="#b91c1c">No direct Presentation → Infrastructure call</text>

  <!-- Allowed flow arrows -->
  <path d="M345 516 C392 516, 485 516, 485 516" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="400" y="494" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#2563eb">call use case</text>

  <path d="M600 486 C600 458, 600 443, 600 427" fill="none" stroke="#15803d" stroke-width="4" marker-end="url(#arrow-green)"/>
  <text x="681" y="461" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#15803d">uses domain</text>

  <path d="M855 516 C806 516, 768 516, 716 516" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="786" y="494" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">depends on ports</text>

  <!-- Composition root -->
  <g id="composition-root">
    <rect x="382" y="704" width="436" height="72" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="600" y="733" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" fill="#334155">Composition Root / Dependency Injection</text>
    <text x="600" y="759" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Wires controllers, use cases, and infrastructure implementations at startup.</text>
  </g>

  <!-- Rule strip -->
  <g id="rule-strip">
    <rect x="115" y="131" width="970" height="46" rx="12" fill="#0f172a"/>
    <text x="600" y="161" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Dependency Rule: outer layers may know inner layers; inner layers must not know outer layers.</text>
  </g>
</svg>
